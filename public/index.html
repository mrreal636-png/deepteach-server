<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepTeachSY - منصة التعلم العميق</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- Google Fonts (Cairo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- التصميم -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============================================================
    الشريط العلوي (Topbar)
    ============================================================ -->
    <header class="topbar" role="banner">
        <div class="topbar-container">
            <!-- الشعار -->
            <div class="topbar-logo" onclick="navigateTo('home')">
                <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                <span>DeepTeachSY</span>
            </div>

            <!-- شريط البحث -->
            <div class="topbar-search">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon" aria-hidden="true"></i>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-bar"
                        placeholder="ابحث عن صف، مادة، درس..."
                        aria-label="بحث"
                        autocomplete="off"
                    />
                    <div id="searchResults" class="search-results" role="listbox"></div>
                </div>
            </div>

            <!-- الأزرار اليمنى -->
            <div class="topbar-actions">
                <!-- أزرار الدخول/التسجيل (لغير المسجلين) -->
                <div id="authButtonsTop" class="auth-buttons">
                    <button
                        class="btn btn-outline btn-sm"
                        onclick="showLoginModal()"
                        aria-label="تسجيل الدخول"
                    >
                        <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
                        <span class="btn-text">دخول</span>
                    </button>
                    <button
                        class="btn btn-sm"
                        onclick="showRegisterModal()"
                        aria-label="حساب جديد"
                    >
                        <i class="fas fa-user-plus" aria-hidden="true"></i>
                        <span class="btn-text">تسجيل</span>
                    </button>
                </div>

                <!-- معلومات المستخدم (للمسجلين) -->
                <div id="userInfoTop" class="user-info" style="display:none;">
                    <span id="userDisplayTop" class="user-name"></span>
                    <button
                        class="btn btn-outline btn-sm"
                        onclick="logout()"
                        aria-label="تسجيل الخروج"
                    >
                        <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                        <span class="btn-text">خروج</span>
                    </button>
                </div>

                <!-- زر فتح/إغلاق الشريط الجانبي (للجوال) -->
                <button
                    class="sidebar-toggle"
                    id="sidebarToggle"
                    aria-label="فتح القائمة"
                    aria-expanded="false"
                >
                    <i class="fas fa-bars" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ============================================================
    الشريط الجانبي الأيمن (Sidebar)
    ============================================================ -->
    <nav class="sidebar" id="mainSidebar" role="navigation" aria-label="القائمة الرئيسية">
        <div class="sidebar-inner">
            <!-- الشعار داخل الشريط (يظهر في الجوال) -->
            <div class="sidebar-logo">
                <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                <span>DeepTeachSY</span>
            </div>

            <!-- قائمة الروابط -->
            <ul class="sidebar-nav">
                <li>
                    <a
                        href="#"
                        onclick="navigateTo('home'); return false;"
                        class="sidebar-link active"
                        data-page="home"
                    >
                        <i class="fas fa-home" aria-hidden="true"></i>
                        <span>الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a
                        href="#"
                        onclick="navigateTo('grades'); return false;"
                        class="sidebar-link"
                        data-page="grades"
                    >
                        <i class="fas fa-layer-group" aria-hidden="true"></i>
                        <span>الصفوف</span>
                    </a>
                </li>
                <li>
                    <a
                        href="#"
                        onclick="navigateTo('about'); return false;"
                        class="sidebar-link"
                        data-page="about"
                    >
                        <i class="fas fa-info-circle" aria-hidden="true"></i>
                        <span>عن المنصة</span>
                    </a>
                </li>
                <!-- حسابي (يظهر بعد تسجيل الدخول) -->
                <li id="profileNavLi" style="display:none;">
                    <a
                        href="#"
                        onclick="navigateTo('profile'); return false;"
                        class="sidebar-link"
                        data-page="profile"
                    >
                        <i class="fas fa-user" aria-hidden="true"></i>
                        <span>حسابي</span>
                    </a>
                </li>
                <!-- روابط الأدمن (تظهر فقط للمشرف) -->
                <li class="admin-only" id="adminUsersLi" style="display:none;">
                    <a
                        href="#"
                        onclick="navigateTo('admin-users'); return false;"
                        class="sidebar-link"
                        data-page="admin-users"
                    >
                        <i class="fas fa-users-cog" aria-hidden="true"></i>
                        <span>إدارة عامة</span>
                    </a>
                </li>
                <li class="admin-only" id="adminContentLi" style="display:none;">
                    <a
                        href="#"
                        onclick="navigateTo('admin-content'); return false;"
                        class="sidebar-link"
                        data-page="admin-content"
                    >
                        <i class="fas fa-edit" aria-hidden="true"></i>
                        <span>إدارة المحتوى</span>
                    </a>
                </li>
            </ul>

            <!-- تذييل الشريط -->
            <div class="sidebar-footer">
                <span id="sidebarUserInfo">زائر</span>
            </div>
        </div>
    </nav>

    <!-- ============================================================
    المحتوى الرئيسي
    ============================================================ -->
    <main class="main-content" id="mainContent" role="main">
        <!-- يتم تعبئته بواسطة JavaScript -->
    </main>

    <!-- ============================================================
    نافذة تسجيل الدخول (Modal)
    ============================================================ -->
    <div id="loginModal" class="modal-overlay" role="dialog" aria-modal="true" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-sign-in-alt" aria-hidden="true"></i> تسجيل الدخول</h3>
                <button class="btn-icon" onclick="closeModal('loginModal')" aria-label="إغلاق">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <div class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user" aria-hidden="true"></i>
                    <input
                        type="text"
                        id="loginUsername"
                        placeholder="اسم المستخدم أو البريد الإلكتروني"
                        autocomplete="username"
                    />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock" aria-hidden="true"></i>
                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="كلمة المرور"
                        autocomplete="current-password"
                    />
                </div>
                <div id="loginError" class="auth-error" style="display:none;"></div>
                <button class="btn-primary" onclick="loginUser()">دخول</button>
                <p class="auth-switch">
                    ليس لديك حساب؟
                    <a href="#" onclick="switchToRegister(); return false;">سجل الآن</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ============================================================
    نافذة التسجيل (Modal)
    ============================================================ -->
    <div id="registerModal" class="modal-overlay" role="dialog" aria-modal="true" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus" aria-hidden="true"></i> حساب جديد</h3>
                <button class="btn-icon" onclick="closeModal('registerModal')" aria-label="إغلاق">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <div class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user" aria-hidden="true"></i>
                    <input type="text" id="regUsername" placeholder="اسم المستخدم" autocomplete="username" />
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="email" />
                </div>
                <div class="input-group">
                    <i class="fas fa-phone" aria-hidden="true"></i>
                    <input type="tel" id="regPhone" placeholder="رقم الهاتف (اختياري)" autocomplete="tel" />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock" aria-hidden="true"></i>
                    <input type="password" id="regPassword" placeholder="كلمة المرور" autocomplete="new-password" />
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle" aria-hidden="true"></i>
                    <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة المرور" autocomplete="new-password" />
                </div>

                <!-- اختيار الخطة -->
                <div class="plan-selector">
                    <label class="plan-option">
                        <input type="radio" name="regPlan" value="free" checked />
                        <div class="plan-card">
                            <i class="fas fa-user" aria-hidden="true"></i>
                            <strong>مجاني</strong>
                            <small>المحتوى المجاني فقط</small>
                        </div>
                    </label>
                    <label class="plan-option">
                        <input type="radio" name="regPlan" value="paid" onchange="toggleGradeSelection()" />
                        <div class="plan-card">
                            <i class="fas fa-crown" aria-hidden="true"></i>
                            <strong>مدفوع</strong>
                            <small>كل المحتوى + دعم</small>
                        </div>
                    </label>
                </div>

                <!-- اختيار الصفوف (للمدفوع) -->
                <div id="gradeSelection" style="display:none; margin-top:10px;">
                    <label class="grade-selection-label">اختر الصفوف التي ترغب في الاشتراك بها:</label>
                    <div id="gradesCheckboxes" class="grades-checkboxes"></div>
                </div>

                <div id="regError" class="auth-error" style="display:none;"></div>
                <button class="btn-primary" onclick="registerUser()">تسجيل</button>
                <p class="auth-switch">
                    لديك حساب؟
                    <a href="#" onclick="switchToLogin(); return false;">سجل الدخول</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ============================================================
    زر العودة للأعلى
    ============================================================ -->
    <button
        class="btn btn-sm back-to-top"
        id="backToTop"
        aria-label="العودة للأعلى"
        style="display:none;"
        onclick="window.scrollTo({top:0,behavior:'smooth'})"
    >
        <i class="fas fa-arrow-up" aria-hidden="true"></i>
    </button>

    <!-- ============================================================
    JavaScript
    ============================================================ -->
    <script src="script.js"></script>
</body>
</html>
