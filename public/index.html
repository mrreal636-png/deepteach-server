<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepTeach - منصة التعلم العميق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== شريط التنقل العلوي (Nav Bar) ===== -->
    <nav class="navbar" id="mainNav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>DeepTeach</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="navigateTo('home')" class="nav-link active" data-page="home">
                    <i class="fas fa-home"></i> الرئيسية
                </a>
                <a href="#" onclick="navigateTo('grades')" class="nav-link" data-page="grades">
                    <i class="fas fa-layer-group"></i> الصفوف
                </a>
                <a href="#" onclick="navigateTo('about')" class="nav-link" data-page="about">
                    <i class="fas fa-info-circle"></i> عن المنصة
                </a>
                <a href="#" onclick="navigateTo('profile')" class="nav-link" data-page="profile" id="profileNav" style="display:none;">
                    <i class="fas fa-user"></i> حسابي
                </a>
                <!-- روابط الأدمن (تظهر فقط للأدمن) -->
                <a href="#" onclick="navigateTo('admin-users')" class="nav-link admin-only" data-page="admin-users" style="display:none;">
                    <i class="fas fa-users-cog"></i> إدارة عامة
                </a>
                <a href="#" onclick="navigateTo('admin-content')" class="nav-link admin-only" data-page="admin-content" style="display:none;">
                    <i class="fas fa-edit"></i> إدارة المحتوى
                </a>
            </div>
            <div class="nav-actions">
                <div id="authButtons">
                    <button class="btn btn-outline btn-sm" onclick="showLoginModal()">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                    <button class="btn btn-sm" onclick="showRegisterModal()">
                        <i class="fas fa-user-plus"></i> تسجيل
                    </button>
                </div>
                <div id="userInfoNav" style="display:none; align-items:center; gap:10px;">
                    <span id="userDisplayNav" style="color:var(--text-primary);"></span>
                    <button class="btn btn-outline btn-sm" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
                <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== واجهة تسجيل الدخول (Modal) ===== -->
    <div id="loginModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h3>
                <button class="btn-icon" onclick="closeModal('loginModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم أو البريد الإلكتروني">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="كلمة المرور">
                </div>
                <div id="loginError" class="auth-error" style="display:none;"></div>
                <button class="btn-primary" onclick="loginUser()">دخول</button>
                <p style="text-align:center; margin-top:10px; color:var(--text-secondary); font-size:0.9rem;">
                    ليس لديك حساب؟ <a href="#" onclick="switchToRegister(); return false;" style="color:var(--gold);">سجل الآن</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ===== واجهة التسجيل (Modal) ===== -->
    <div id="registerModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> حساب جديد</h3>
                <button class="btn-icon" onclick="closeModal('registerModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="اسم المستخدم">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="regPhone" placeholder="رقم الهاتف (اختياري)">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="كلمة المرور">
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة المرور">
                </div>
                <div class="plan-selector">
                    <label class="plan-option">
                        <input type="radio" name="regPlan" value="free" checked>
                        <div class="plan-card">
                            <i class="fas fa-user"></i>
                            <strong>مجاني</strong>
                            <small>المحتوى المجاني فقط</small>
                        </div>
                    </label>
                    <label class="plan-option">
                        <input type="radio" name="regPlan" value="paid" onchange="toggleGradeSelection()">
                        <div class="plan-card">
                            <i class="fas fa-crown"></i>
                            <strong>مدفوع</strong>
                            <small>كل المحتوى + دعم</small>
                        </div>
                    </label>
                </div>
                <div id="gradeSelection" style="display:none; margin-top:10px;">
                    <label style="color:var(--text-secondary); font-size:0.9rem;">اختر الصفوف التي ترغب في الاشتراك بها:</label>
                    <div id="gradesCheckboxes" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:8px;"></div>
                </div>
                <div id="regError" class="auth-error" style="display:none;"></div>
                <button class="btn-primary" onclick="registerUser()">تسجيل</button>
                <p style="text-align:center; margin-top:10px; color:var(--text-secondary); font-size:0.9rem;">
                    لديك حساب؟ <a href="#" onclick="switchToLogin(); return false;" style="color:var(--gold);">سجل الدخول</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ===== المحتوى الرئيسي ===== -->
    <main class="main-content" id="mainContent">
        <!-- سيتم تعبئته بواسطة JavaScript -->
    </main>

    <!-- ===== زر العودة للأعلى ===== -->
    <button class="btn btn-sm" id="backToTop" style="position:fixed; bottom:20px; left:20px; display:none; z-index:100;" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
